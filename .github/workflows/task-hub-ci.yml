name: Task Hub CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskhub
          POSTGRES_PASSWORD: taskhub
          POSTGRES_DB: taskhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskhub -d taskhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping | grep -q PONG"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://taskhub:taskhub@localhost:5432/taskhub
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-taskhub-secret-with-at-least-thirty-two-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run db:validate
      - run: npm --workspace backend run lint
      - run: npm --workspace frontend run lint
      - run: npx tsc -p backend/tsconfig.json --noEmit --incremental false
      - run: npm --workspace frontend run typecheck
      - run: npm --workspace backend run test:unit
      - run: npm --workspace backend run test:e2e
      - run: npm --workspace frontend run test
      - run: npm --workspace backend run build
      - run: npm --workspace frontend run build
      - run: npx playwright install --with-deps chromium
      - run: npm --workspace frontend run test:smoke -- --project=chromium
      - run: docker build -f backend/Dockerfile .
      - run: docker build -f frontend/Dockerfile .
      - run: npm audit --audit-level=moderate
