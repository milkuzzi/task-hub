name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pip-audit
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy app || true
      - name: pip-audit (fail on vulnerabilities)
        run: pip-audit -r requirements.txt --strict

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: ESLint
        run: npx eslint .
      - name: TypeScript (tsc --noEmit)
        run: npx tsc --noEmit
      - name: npm audit (high+)
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build
