resolver 127.0.0.11 valid=10s ipv6=off;

upstream taskhub_backend {
  zone taskhub_backend 64k;
  server taskhub-backend:3000 resolve;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  include /etc/nginx/mime.types;

  # CSP задаётся на публичном edge-Caddy, чтобы в production не было
  # дублирующихся политик из двух proxy-слоёв.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Health для docker-compose healthcheck (Req 3.6).
  location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

  # SPA entrypoint не должен надолго кешироваться: assets имеют hash в имени,
  # а index.html должен быстро подтягивать новый hash после деплоя.
  location = /index.html {
    expires -1;
    try_files /index.html =404;
  }

  # PDF.js worker собирается Vite как hashed .mjs. В nginx:alpine этот тип
  # может отсутствовать в mime.types; с nosniff браузеры блокируют worker.
  location ~* \.mjs$ {
    default_type application/javascript;
    try_files $uri =404;
  }

  # REST: /api/* → backend:3000 со срезанием префикса /api (как Vite rewrite).
  # Через этот же путь отдаются вложения (Req 4.2): только проксированием.
  location /api/ {
    proxy_pass http://taskhub_backend/;          # trailing slash срезает /api
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    # Caddy is the only supported edge and sanitizes this header. Do not append
    # client-supplied values at the internal nginx hop.
    proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
    # TLS терминирует edge-Caddy; внутренний хоп edge→nginx→backend идёт по HTTP.
    # Backend форсирует HTTPS-redirect для запросов без X-Forwarded-Proto=https,
    # поэтому явно сообщаем исходный (публичный) протокол.
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 30m;                    # ≥ LIMIT_ATTACHMENT_MAX_BYTES
    client_body_timeout 120s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
  }

  # MAX Bot webhook: публичный endpoint без /api, путь должен попасть в NestJS
  # как /max/bot/webhook.
  location /max/bot/ {
    proxy_pass http://taskhub_backend;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 10m;
  }

  # Socket.IO: апгрейд WebSocket (Req 3.5).
  location /socket.io/ {
    proxy_pass http://taskhub_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;    # см. /api/ — иначе 301-redirect ломает handshake
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA-fallback (Req 3.3): всё прочее — index.html.
  location / { try_files $uri $uri/ /index.html; }
}
