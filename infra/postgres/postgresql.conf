# Reference host: 4 vCPU / 8 GB. Tuned for the list-query workload.
listen_addresses = '*'
max_connections = 50            # app reaches PG via PgBouncer; keep low
shared_buffers = 2GB            # ~25% of 8GB RAM
effective_cache_size = 4800MB   # ~60% of 8GB RAM
work_mem = 32MB                 # sized for the keyset list sort/agg plans
maintenance_work_mem = 256MB
random_page_cost = 1.1          # SSD
effective_io_concurrency = 200  # SSD
wal_compression = on
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
default_statistics_target = 200
jit = off                       # short OLTP queries: JIT hurts
log_min_duration_statement = 200ms
log_destination = 'stderr'
logging_collector = off
timezone = 'UTC'
