load_module /etc/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /etc/nginx/modules/ngx_http_brotli_static_module.so;
# HTTP/2 + TLS1.3 (1.2 fallback), OCSP stapling, strict CSP with per-request
# nonce, brotli (pre-compressed static), X-Accel-Redirect internal file serving.
user nginx;
worker_processes auto;
events { worker_connections 2048; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  log_format json escape=json '{"ts":"$time_iso8601","rid":"$http_x_request_id",'
    '"ip":"$remote_addr","method":"$request_method","uri":"$uri",'
    '"status":$status,"rt":$request_time,"ua":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json;

  # gzip on the fly; brotli served from pre-compressed .br produced by Vite
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_static on;   # serve .gz when present
  brotli on;
  brotli_comp_level 5;
  brotli_types text/css application/javascript application/json image/svg+xml;
  brotli_static on;   # serve pre-compressed .br produced by Vite

  # per-request CSP nonce
  map $request_id $cspnonce { default $request_id; }

  upstream backend { server backend:8000; keepalive 32; }

  # rate limit zones: general api + tighter login/register
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # HTTP -> HTTPS
  server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location /healthz { return 200 "ok"; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$cspnonce'; style-src 'self' 'nonce-$cspnonce'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; connect-src 'self'" always;

    # static SPA with immutable content-hash caching
    root /usr/share/nginx/html;
    index index.html;
    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }
    location / { try_files $uri /index.html; }

    # API proxy
    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://backend;
    }
    location = /api/auth/login    { limit_req zone=auth burst=3 nodelay; proxy_pass http://backend; }
    location = /api/auth/register { limit_req zone=auth burst=3 nodelay; proxy_pass http://backend; }

    # X-Accel internal: backend authorizes, returns X-Accel-Redirect: /internal-files/...
    # nginx streams the bytes from this internal-only location.
    location /internal-files/ {
      internal;
      alias /data/uploads/;
      add_header Content-Disposition "attachment" always;
      add_header X-Content-Type-Options nosniff always;
    }
  }
}
